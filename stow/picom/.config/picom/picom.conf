// ~/.config/picom/picom.conf — managed by confepo
// Compositor: vsync (no tearing), light shadows, rounded corners, fading.
// If you see a black screen / no rendering in a VM, change backend to "xrender".

backend = "glx";
vsync = true;
use-damage = true;

// ---- Rounded corners ----
corner-radius = 10;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'i3bar'"
];

// ---- Shadows ----
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.45;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'i3-frame'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

// ---- Fading ----
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

// ---- Transparency ----
inactive-opacity = 0.96;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
focus-exclude = [ "class_g = 'rofi'", "class_g = 'flameshot'" ];

// Per-app opacity rules
opacity-rule = [
  "92:class_g = 'Alacritty' && focused",
  "86:class_g = 'Alacritty' && !focused"
];

// ---- Misc ----
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

wintypes:
{
  tooltip      = { fade = true; shadow = false; opacity = 0.95; };
  dock         = { shadow = false; };
  dnd          = { shadow = false; };
  popup_menu   = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
};
