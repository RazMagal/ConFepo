# ~/.config/starship.toml — managed by confepo
# Prompt: directory · git branch/status · cmd duration · prompt char
# Right:  exit status · clock

add_newline = true
command_timeout = 1000

format = """$directory$git_branch$git_status$cmd_duration$character"""
right_format = """$status$time"""

[character]
success_symbol = "[➜](bold green)"
error_symbol   = "[➜](bold red)"
vimcmd_symbol  = "[](bold yellow)"

[directory]
truncation_length = 3
truncate_to_repo  = true
style = "bold cyan"
read_only = " 🔒"

[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
style     = "bold yellow"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "="
untracked = "?${count}"
modified  = "!${count}"
staged    = "+${count}"
stashed   = "≡${count}"
deleted   = "✘${count}"

[cmd_duration]
min_time = 500
format   = "took [$duration](bold yellow) "

[status]
disabled = false
symbol   = "✗"
format   = "[$symbol $status]($style) "
style    = "bold red"

[time]
disabled    = false
format      = "[$time]($style)"
time_format = "%H:%M:%S"
style       = "bold dimmed white"
